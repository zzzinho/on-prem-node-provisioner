---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: onp-controller
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - onp.io
  resources:
  - machines
  - nodepools
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - onp.io
  resources:
  - machines/status
  - nodepools/status
  verbs:
  - get
  - patch
  - update
