---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: machines.onp.io
spec:
  group: onp.io
  names:
    kind: Machine
    listKind: MachineList
    plural: machines
    shortNames:
    - mc
    singular: machine
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.power.wol.macAddress
      name: MAC
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Machine is an individual physical, ONP-managed node: its identity and the
          metadata ONP needs to power it on and off.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MachineSpec is the desired state of a Machine: the identity and power
              metadata an operator supplies for one physical, ONP-managed node.
            properties:
              capacity:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  Capacity is the node's resource capacity used for fit checks while the
                  node is powered off. It is the source of truth precisely because the
                  kubelet-reported Node.Status.Capacity is stale or empty when off.
                type: object
              labels:
                additionalProperties:
                  type: string
                description: |-
                  Labels are merged with NodePool.template labels and applied to the Node
                  once it becomes Ready.
                type: object
              nodeName:
                description: |-
                  NodeName is the name of the Node this Machine maps to. In Phase 1 it is
                  always equal to metadata.name; the field is explicit so the mapping can
                  be relaxed later without a schema change.
                type: string
              power:
                description: Power selects and configures how this node is powered
                  on.
                properties:
                  provider:
                    description: Provider names the power-on mechanism. Phase 1 supports
                      wol only.
                    enum:
                    - wol
                    type: string
                  wol:
                    description: WoL holds Wake-on-LAN configuration; set when Provider
                      is wol.
                    properties:
                      broadcastAddress:
                        description: |-
                          BroadcastAddress is the L2 broadcast destination for the magic packet.
                          When empty the controller falls back to 255.255.255.255.
                        type: string
                      macAddress:
                        description: MacAddress is the target NIC's MAC, e.g. "aa:bb:cc:dd:ee:ff".
                        type: string
                    required:
                    - macAddress
                    type: object
                required:
                - provider
                type: object
              shutdown:
                description: |-
                  Shutdown selects how this node is powered off. Phase 1 has a single
                  provider (agent); the field carries no other options yet.
                properties:
                  provider:
                    default: agent
                    description: Provider names the shutdown mechanism. Phase 1 supports
                      agent only.
                    enum:
                    - agent
                    type: string
                type: object
            required:
            - nodeName
            - power
            type: object
          status:
            description: MachineStatus is the observed state of a Machine.
            properties:
              conditions:
                description: Conditions follow the standard Kubernetes condition pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              state:
                description: State is the current lifecycle state.
                enum:
                - "Off"
                - Booting
                - Ready
                - Draining
                - ShuttingDown
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
