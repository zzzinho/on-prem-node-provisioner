# The wol-agent is a k8s-free binary: it serves /wake and broadcasts magic
# packets, nothing more. This ServiceAccount carries NO Role/ClusterRole binding
# by design — the agent must never hold a single Kubernetes API permission.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "onp.fullname" . }}-wol-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "onp.labels" . | nindent 4 }}
    app.kubernetes.io/component: wol-agent
automountServiceAccountToken: false
