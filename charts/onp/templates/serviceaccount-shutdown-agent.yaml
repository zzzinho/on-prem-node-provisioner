# Unlike the wol-agent, the shutdown-agent IS k8s-aware: it watches the Machine
# backing its own node and powers the host off when that Machine reaches
# ShuttingDown. It therefore needs a token and a (read-only) ClusterRole.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "onp.fullname" . }}-shutdown-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "onp.labels" . | nindent 4 }}
    app.kubernetes.io/component: shutdown-agent
