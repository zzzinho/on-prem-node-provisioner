apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onp.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "onp.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "onp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "onp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "onp.fullname" . }}-controller
      {{- with .Values.placement.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.placement.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        # distroless:nonroot's UID/GID. Numeric so the kubelet can verify non-root;
        # the image's "USER nonroot" name alone is unverifiable under runAsNonRoot.
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: controller
        image: {{ include "onp.image" (dict "root" $ "name" .Values.controller.name) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - --wol-agent-endpoint=http://{{ include "onp.fullname" . }}-wol-agent.{{ .Release.Namespace }}.svc:{{ .Values.wolAgent.port }}
        - --boot-timeout={{ .Values.controller.bootTimeout }}
        - --log-level={{ .Values.controller.logLevel }}
        - --leader-elect={{ .Values.controller.leaderElect }}
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          {{- toYaml .Values.controller.resources | nindent 10 }}
