{{- /*
Shared bearer token for the wol-agent's /wake endpoint. The agent runs
hostNetwork, where NetworkPolicy cannot protect it, so this token is what keeps
arbitrary in-cluster pods and same-L2 hosts from waking machines.

Rendered only when auth is enabled AND the operator did not bring their own
Secret (wolAgent.auth.existingSecret). On upgrade, `lookup` reuses the token
already in the cluster so the controller and agent never split on a rotated
value mid-rollout; `lookup` returns nothing under `helm template`/`--dry-run`,
where a fresh random token is generated instead (fine — nothing consumes it).
*/}}
{{- if and .Values.wolAgent.auth.enabled (not .Values.wolAgent.auth.existingSecret) }}
{{- $secretName := include "onp.wolTokenSecretName" . }}
{{- $token := randAlphaNum 32 }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if and $existing $existing.data (hasKey $existing.data "token") }}
{{- $token = index $existing.data "token" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "onp.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $token | quote }}
{{- end }}
