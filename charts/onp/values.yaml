# Image coordinates. Both images live in the same self-hosted registry under a
# common repository prefix: <registry>/<repository>/<component>:<tag>.
# Anonymous pull is enabled on the registry, so no imagePullSecrets are needed.
image:
  # Defaults to GitHub Container Registry. Override for your own registry, e.g.
  #   --set image.registry=<your-registry>   (or a local -f values file).
  registry: ghcr.io
  repository: onp
  # tag empty -> falls back to .Chart.AppVersion (see _helpers.tpl onp.image).
  tag: ""
  pullPolicy: IfNotPresent

controller:
  name: onp-controller
  replicas: 1
  # How long to wait for a woken node to report Ready before failing.
  bootTimeout: 10m
  # How long to wait for a node to go NotReady after power-off before failing the
  # Machine (so a power-off that never lands does not poll forever).
  shutdownTimeout: 5m
  # How long a Ready Machine's Node may stay NotReady (with no ONP drain) before
  # the Machine falls back to Off so scale-up can wake it again.
  nodeLossGracePeriod: 1m
  logLevel: info
  # Single-replica by default. For HA set replicas > 1 AND leaderElect: true; the
  # lease RBAC (Role/RoleBinding) is rendered only when leaderElect is true.
  leaderElect: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

wolAgent:
  name: onp-wol-agent
  # Address the agent binds inside its (host) network namespace.
  listenAddr: ":9119"
  # Port the Service exposes and the controller dials.
  port: 9119
  logLevel: info
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# The shutdown-agent is a privileged DaemonSet on ONP-MANAGED nodes (the ones ONP
# powers off). It watches its own node's Machine and runs `systemctl poweroff`
# when that Machine reaches ShuttingDown. Unlike the wol-agent it is k8s-aware
# (read-only Machine watch) and must NOT run on always-on nodes.
shutdownAgent:
  name: onp-shutdown-agent
  logLevel: info
  # Managed nodes must carry this label so the DaemonSet lands only on them.
  nodeSelector:
    onp.io/managed: "true"
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# Placement applies to BOTH the controller and the wol-agent. They must run only
# on always-on nodes: wakeable nodes are powered off, and the agent's magic
# packet is an L2 broadcast that must originate from a node sharing the segment.
placement:
  nodeSelector:
    onp.io/always-on: "true"
  tolerations:
    - operator: Exists

# The release namespace must permit the privileged shutdown-agent DaemonSet. On a
# cluster that enforces Pod Security Admission, the namespace needs the
# `pod-security.kubernetes.io/enforce: privileged` label.
#
# If you install with `helm install --create-namespace`, Helm does not label the
# namespace; set `kubectl label ns <ns> pod-security.kubernetes.io/enforce=privileged`
# yourself, or let the chart own the namespace by setting create: true here and
# installing WITHOUT --create-namespace.
namespace:
  # When true, the chart creates the release namespace and stamps the PSA label
  # below on it. Leave false (the default) when you manage the namespace yourself
  # or use --create-namespace.
  create: false
  # Pod Security Standard enforced on the namespace when create is true. Must be
  # privileged for the shutdown-agent to schedule.
  podSecurityEnforce: privileged
